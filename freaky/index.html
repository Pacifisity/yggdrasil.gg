<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Freaky's Games</title>
	<style>
		:root {
			color-scheme: dark;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 24px;
			background: #0d0b10;
			color: #f3f3f3;
			font: 16px/1.5 system-ui, sans-serif;
		}

		main {
			width: min(720px, 100%);
		}

		ul {
			list-style: none;
			padding: 0;
			margin: 0;
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			gap: 14px;
		}

		a {
			display: block;
			padding: 18px;
			border: 1px solid #2b2b2b;
			border-radius: 14px;
			background: #15131a;
			color: inherit;
			text-decoration: none;
		}

		a:hover {
			background: #1b1821;
			border-color: #3a3a3a;
		}

		.title {
			display: block;
			font-size: 1.05rem;
			font-weight: 600;
		}

		.description {
			display: block;
			margin-top: 6px;
			font-size: 0.92rem;
			line-height: 1.45;
			color: #a3a3a3;
		}
	</style>
</head>
<body>
	<main id="app"></main>
	<script>
		const games = {
			cat: {
				title: "Cat",
				description: "Chaotic surreal browser game with a loud visual style.",
				url: "https://htmlpreview.github.io/?https://github.com/Freaky-Bot/grotesque-Vissual-studio/blob/main/dist/index.html",
			},
			incremental: {
				title: "Incremental",
				description: "An idle progress game built around loops and upgrades.",
				url: "https://htmlpreview.github.io/?https://github.com/Freaky-Bot/-incrimental-game/blob/main/dist/index.html",
			},
		};

		const game = new URLSearchParams(location.search).keys().next().value;
		const currentGame = games[game];
		if (currentGame) {
			window.location.replace(currentGame.url);
		} else {
			const app = document.getElementById("app");
			const list = Object.entries(games).map(([key, info]) => (
				`<li><a href="?${key}"><span class="title">${info.title}</span><span class="description">${info.description}</span></a></li>`
			)).join("");

			app.innerHTML = `<ul>${list}</ul>`;
		}
	</script>
</body>
</html>
