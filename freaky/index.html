<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Freaky's Games</title>
</head>
<body>
	<script>
		const games = {
			cat: "https://htmlpreview.github.io/?https://github.com/Freaky-Bot/grotesque-Vissual-studio/blob/main/dist/index.html",
			incremental: "https://htmlpreview.github.io/?https://github.com/Freaky-Bot/-incrimental-game/blob/main/dist/index.html",
		};

		const game = new URLSearchParams(location.search).keys().next().value;
		const url = games[game];
		if (url) {
			window.location.replace(url);
		} else {
			document.write('<p>Available games: ' + Object.keys(games).map(k => '<a href="?' + k + '">' + k + '</a>').join(', ') + '</p>');
		}
	</script>
</body>
</html>
